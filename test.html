<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncSkill – Responsive Header (menu X fix)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & VARIABLES ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --spacing: 0.25rem;
      --color-white: #fff;
      --color-dark-teal: #012726;
      --color-teal-hover: #004D4B;
      --font-sans: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
      --font-weight-medium: 500;
      --radius-full: 9999px;
      --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --header-height: 72px;
    }

    body {
      font-family: var(--font-sans);
      line-height: 1.6;
      padding-top: var(--header-height);
    }

    /* ----- HEADER ----- */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: var(--header-height);
      z-index: 100; /* Highest priority */
      background-color: var(--color-white);
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
    }

    .header-container {
      width: 90%;
      margin: 0 auto;
      max-width: 1280px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo {
      width: 140px;
      height: auto;
      display: block;
    }

    .nav-links {
      display: none;
      gap: 8px;
    }

    @media (min-width: 768px) {
      .nav-links { display: flex; }
    }

    .nav-link {
      padding: 8px 16px;
      font-weight: var(--font-weight-medium);
      color: var(--color-dark-teal);
      text-decoration: none;
      border-radius: var(--radius-full);
      transition: 0.2s;
    }

    .nav-link:hover {
      background-color: #f8fafc;
    }

    .nav-right {
      display: flex;
      align-items: center;
    }

    /* Auth Buttons (Desktop) */
    .auth-buttons {
      display: none;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .auth-buttons { display: flex; }
    }

    .auth-button {
      padding: 10px 24px;
      font-weight: var(--font-weight-medium);
      border-radius: 8px; /* Matching the boxier look in the screenshot */
      text-decoration: none;
      transition: 0.2s;
      border: 1px solid var(--color-dark-teal);
    }

    .auth-button.submit {
      background-color: var(--color-dark-teal);
      color: var(--color-white);
    }

    /* Hamburger / Close Button (Mobile) */
    .menu-button {
      display: flex;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: var(--color-dark-teal);
      transition: background-color 0.2s;
    }

    .menu-button:hover {
      background-color: #f1f5f9;
    }

    @media (min-width: 768px) {
      .menu-button { display: none; }
    }

    /* ----- MOBILE MENU (DROPDOWN) ----- */
    #mobileMenu {
      position: fixed;
      top: var(--header-height); /* Starts right below header */
      left: 0;
      width: 100%;
      background: var(--color-white);
      z-index: 90; /* Just below header */
      transform: translateY(-110%); /* Hidden above */
      transition: transform 0.3s ease-in-out;
      padding: 24px 5%;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #mobileMenu.active {
      transform: translateY(0);
    }

    .mobile-nav-link {
      font-size: 1.1rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--color-dark-teal);
      padding: 8px 0;
    }

    .mobile-auth-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid #f1f5f9;
    }

    .mobile-auth-button {
      width: 100%;
      padding: 14px;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--color-dark-teal);
    }

    .mobile-auth-button.submit {
      background: var(--color-dark-teal);
      color: var(--color-white);
    }

    #menuOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
      z-index: 80;
      display: none;
    }

    #menuOverlay.active {
      display: block;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-container">
      <div class="nav-left">
        <a href="/" aria-label="Home">
          <img class="logo" src="https://syncskill.in/assets/syncskill-logo.svg" alt="SyncSkill Logo">
        </a>
        <div class="nav-links">
          <a class="nav-link" href="/upskill">Upskill your Team</a>
          <a class="nav-link" href="/about-us">About</a>
        </div>
      </div>

      <div class="nav-right">
        <!-- menu button: icon will be swapped via JS -->
        <button class="menu-button" id="mobileMenuButton" aria-label="Open menu" aria-expanded="false">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <div class="auth-buttons">
          <a class="auth-button" href="/login" style="color: var(--color-dark-teal);">Login</a>
          <a class="auth-button submit" href="/apply">Apply as Mentor</a>
        </div>
      </div>
    </div>
  </header>

  <div id="mobileMenu">
    <a href="/upskill" class="mobile-nav-link">Upskill your Team</a>
    <a href="/about-us" class="mobile-nav-link">About</a>
    <div class="mobile-auth-stack">
      <a href="/login" class="mobile-auth-button">Login</a>
      <a href="/apply" class="mobile-auth-button submit">Apply as Mentor</a>
    </div>
  </div>

  <div id="menuOverlay"></div>

  <main style="padding: 4rem 2rem; text-align: center;">
    <h1>Main Content Area</h1>
    <p>Scroll down or resize to see the navigation in action — on mobile the hamburger turns into an X when menu is open.</p>
  </main>

  <script>
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuButton = document.getElementById('mobileMenuButton');
    const menuOverlay = document.getElementById('menuOverlay');

    // SVG icons as strings for toggling
    const HAMBURGER_ICON = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>`;
    const CLOSE_ICON = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>`;

    function toggleMenu() {
      const isActive = mobileMenu.classList.toggle('active');
      menuOverlay.classList.toggle('active');
      
      // Toggle body scroll to prevent background scrolling
      document.body.style.overflow = isActive ? 'hidden' : '';

      // Update button icon and accessibility label
      if (isActive) {
        mobileMenuButton.innerHTML = CLOSE_ICON;
        mobileMenuButton.setAttribute('aria-label', 'Close menu');
        mobileMenuButton.setAttribute('aria-expanded', 'true');
      } else {
        mobileMenuButton.innerHTML = HAMBURGER_ICON;
        mobileMenuButton.setAttribute('aria-label', 'Open menu');
        mobileMenuButton.setAttribute('aria-expanded', 'false');
      }
    }

    mobileMenuButton.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    // Close menu if window is resized to desktop width, and ensure icon is reset
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768 && mobileMenu.classList.contains('active')) {
        // Force close menu without toggling icon twice? We'll just call toggleMenu which handles both.
        toggleMenu();
      } else if (window.innerWidth >= 768 && !mobileMenu.classList.contains('active')) {
        // When resized to desktop while menu closed, make sure the button shows hamburger (already correct, but just in case)
        // This is optional, but we want the icon to always be hamburger on desktop if the button were visible (it's hidden anyway)
        // However the button is hidden via CSS, so no visual issue. But we keep it consistent.
        if (mobileMenuButton.innerHTML.includes('M6 18L18 6')) { // if it's X icon, reset to hamburger (though button hidden)
          mobileMenuButton.innerHTML = HAMBURGER_ICON;
          mobileMenuButton.setAttribute('aria-label', 'Open menu');
          mobileMenuButton.setAttribute('aria-expanded', 'false');
        }
      }
    });

    // Also ensure that if the menu is closed by any other means (like pressing ESC could be added), but we keep it simple.
    // Optional: close on ESC key for better UX
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && mobileMenu.classList.contains('active')) {
        toggleMenu();
      }
    });

    // Edge case: if the button is somehow out of sync on page load, ensure correct icon (hamburger)
    // But mobile menu is hidden initially, so it's fine.
  </script>

</body>
</html>
